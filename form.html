<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <form action="">
    <label for="fullname">Name:</label>
    <input type="text" placeholder="Enter your name" id="fullname" name="fullname"> <br>
    <!-- Email -->
    <label for="email">Email <address></address>:</label>
    <input type="email" placeholder="Enter valid email id" name="email" id="email"> <br>
    <!-- Password -->
    <label for="password">Password:</label>
    <input type="password" placeholder="" minlength="8" name="psw" id="psw"> <br>
    <!-- number input -->
    <label for="age">Age:</label>
    <input type="number" id="age" name="age" min="18" max="100">
    <!-- radio button-->
     <input type="radio" id="male" name="gender" value="male">
     <label for="gender">Male</label>
     <input type="radio" id="female" name="gender" value="female">
     <label for="gender>Female</label>
    <!-- data picker -->
    <label for="dob"></label>Date of Birth</label>
    <input type="date" name="dob" id="dob">
    <!-- button -->
     <button type="submit">submit</button>
     <button type="reset">reset</button>
</form>   
</body>
</html>
